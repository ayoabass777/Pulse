version: 2

models:
  - name: int_sessions
    description: |
      Event-level data with session assignment. 30-minute inactivity gap
      defines session boundaries. Each event tagged with session_id.
    columns:
      - name: session_id
        description: "user_id:session_number"
        data_tests:
          - not_null
      - name: event_id
        data_tests:
          - unique
          - not_null

  - name: int_funnels
    description: |
      Funnel-relevant events with step position. Filters to events
      where funnel_step_index is not null.
    columns:
      - name: event_id
        data_tests:
          - unique
          - not_null
      - name: funnel_step_index
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2, 3, 4]
